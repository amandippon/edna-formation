version: '3'

vars:
  DBT_DIR: ./transformation
  SUPERSET_DIR: ./visualization
  SUPERSET_CONTAINER: superset
  PROJECT_DIR:
    sh: pwd

tasks:
  default:
    silent: true
    cmds:
      - task --list

  # ─────────────────────────────────────────────
  # Pipeline principal
  # ─────────────────────────────────────────────

  pipeline:
    desc: "🚀 Pipeline complet : ingestion + transformation"
    cmds:
      - task: ingest
      - task: dbt:deps
      - task: dbt:run

  # ─────────────────────────────────────────────
  # Ingestion
  # ─────────────────────────────────────────────

  ingest:
    desc: "📥 Ingestion des CSV vers Parquet"
    cmds:
      - uv run python ingestion/pipeline.py

  # ─────────────────────────────────────────────
  # dbt
  # ─────────────────────────────────────────────

  dbt:deps:
    desc: "📦 Installation des packages dbt"
    dir: "{{.DBT_DIR}}"
    cmds:
      - uv run dbt deps

  dbt:run:
    desc: "⚙️  Transformation des données (dbt)"
    dir: "{{.DBT_DIR}}"
    cmds:
      - uv run dbt run

  dbt:test:
    desc: "✅ Tests qualité des données"
    dir: "{{.DBT_DIR}}"
    cmds:
      - uv run dbt test

  colibri:generate:
    desc: "🎨 Génère le dashboard de lineage des colonnes avec Colibri"
    dir: "{{.DBT_DIR}}"
    cmds:
      - echo "🔄 Génération des artifacts dbt..."
      - uv run dbt docs generate
      - echo "🎨 Génération du dashboard Colibri..."
      - |
        uv run colibri generate \
          --manifest target/manifest.json \
          --catalog target/catalog.json \
          --output-dir {{.PROJECT_DIR}}/colibri-docs
      - 'echo "✅ Dashboard généré → {{.PROJECT_DIR}}/colibri-docs/index.html"'

  colibri:open:
    desc: "🌐 Ouvre le dashboard Colibri dans le navigateur (port 8088)"
    cmds:
      - |
        if [ -f "{{.PROJECT_DIR}}/colibri-docs/index.html" ]; then
          echo "🌐 Dashboard disponible à : {{.PROJECT_DIR}}/colibri-docs/index.html"

          if [ -n "$CODESPACES" ] || [ -n "$CODESPACE_NAME" ] || [ -n "$REMOTE_CONTAINERS" ] || [ -f "/.dockerenv" ]; then
            echo "📡 Environnement distant détecté"
            echo "🔗 Démarrage du serveur HTTP sur le port 8088..."
            echo ""
            echo "   👉 Allez dans l'onglet 'PORTS' en bas de VSCode"
            echo "   👉 Cliquez sur l'icône globe 🌐 à côté du port 8088"
            echo ""
            python3 -m http.server 8088 --directory {{.PROJECT_DIR}}/colibri-docs
          elif command -v xdg-open &> /dev/null; then
            xdg-open {{.PROJECT_DIR}}/colibri-docs/index.html
          elif command -v open &> /dev/null; then
            open {{.PROJECT_DIR}}/colibri-docs/index.html
          else
            echo "💡 Lancez : python3 -m http.server 8088 --directory {{.PROJECT_DIR}}/colibri-docs"
          fi
        else
          echo "❌ Dashboard non trouvé. Lancez d'abord : task documentation"
        fi

  documentation:
    desc: "📖 Génère et ouvre le dashboard Colibri (lineage des colonnes, port 8088)"
    cmds:
      - task: colibri:generate
      - task: colibri:open

  # ─────────────────────────────────────────────
  # Superset
  # ─────────────────────────────────────────────

  superset:up:
    desc: "🚀 Démarre et initialise Superset"
    dir: "{{.SUPERSET_DIR}}"
    env:
      PROJECT_DIR: "{{.PROJECT_DIR}}"
    cmds:
      - docker compose build
      - docker compose up -d
      - echo "⏳ Attente du démarrage de Superset..."
      - |
        timeout=120; elapsed=0
        until docker exec {{.SUPERSET_CONTAINER}} curl -sf http://localhost:8088/health 2>/dev/null; do
          sleep 5; elapsed=$((elapsed+5))
          if [ $elapsed -ge $timeout ]; then echo "❌ Superset n'a pas démarré après ${timeout}s" && exit 1; fi
        done
      - docker cp {{.PROJECT_DIR}}/edna-sports-data.duckdb {{.SUPERSET_CONTAINER}}:/app/superset_home/edna-sports-data.duckdb
      - docker exec {{.SUPERSET_CONTAINER}} superset db upgrade
      - docker exec {{.SUPERSET_CONTAINER}} superset fab create-admin --username admin --firstname Admin --lastname User --email admin@edna.fr --password admin || true
      - docker exec {{.SUPERSET_CONTAINER}} superset init
      - 'echo "✅ Superset prêt → http://localhost:8089 (admin / admin)"'

  superset:down:
    desc: "🛑 Arrête Superset"
    dir: "{{.SUPERSET_DIR}}"
    env:
      PROJECT_DIR: "{{.PROJECT_DIR}}"
    cmds:
      - docker compose down

  superset:logs:
    desc: "📋 Affiche les logs Superset"
    dir: "{{.SUPERSET_DIR}}"
    env:
      PROJECT_DIR: "{{.PROJECT_DIR}}"
    cmds:
      - docker compose logs -f superset

  superset:reset:
    desc: "⚠️  Réinitialise Superset (supprime toutes les données)"
    dir: "{{.SUPERSET_DIR}}"
    prompt: "Cela supprimera TOUTES les données Superset. Continuer?"
    env:
      PROJECT_DIR: "{{.PROJECT_DIR}}"
    cmds:
      - docker compose down -v --remove-orphans
      - task: superset:up

  # ─────────────────────────────────────────────
  # Maintenance
  # ─────────────────────────────────────────────

  clean:
    desc: "🧹 Nettoyage des fichiers temporaires"
    cmds:
      - rm -rf transformation/target transformation/logs transformation/dbt_packages
      - find . -type d -name __pycache__ -exec rm -rf {} + 2>/dev/null || true
      - echo "✅ Nettoyage terminé"
